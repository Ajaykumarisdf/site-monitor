name: Site Reachability Monitor

on:
  # ── Runs every day at 3:45 AM UTC = ~9:15 AM IST ──────────────
  # NOTE: GitHub may delay scheduled runs by up to 15–30 min on busy days.
  # Using :45 avoids the common :00/:30 congestion on GitHub's scheduler.
  schedule:
    - cron: '45 3 * * *'

  # ── Manual trigger from GitHub Actions UI ──────────────────────
  workflow_dispatch:

jobs:
  monitor:
    name: Check Sites & Send Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run site monitor
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_CC:       ${{ secrets.EMAIL_CC }}
          EMAIL_APP_PASS: ${{ secrets.EMAIL_APP_PASS }}
        run: python monitor.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: site-report-${{ github.run_id }}
          path: site-report-*.xlsx
          retention-days: 30
